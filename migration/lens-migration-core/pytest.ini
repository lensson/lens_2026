[pytest]
# 测试文件发现
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 输出配置
addopts =
    -v
    --tb=short
    --no-header

# 日志
log_cli = false
log_level = WARNING

# 标记注册（避免 PytestUnknownMarkWarning）
markers =
    live: 需要真实 API Key 或在线服务的集成测试
    offline: 纯离线 Mock 测试，无需任何 Key

# 让 src/main/python 可以被 import（pytest 会将此路径加入 sys.path）
pythonpath = src/main/python

