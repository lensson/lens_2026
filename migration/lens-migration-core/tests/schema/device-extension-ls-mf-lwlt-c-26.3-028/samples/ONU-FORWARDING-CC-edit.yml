arguments:
  onu-name:
    description: ONU name
    suggested-values:
    - ani-1-1-1
  cc-name:
    description: The name of the VLAN sub-interface that will be created
    suggested-values:
    - cc-1
  enet-name:
    description: The name of the Ethernet UNI on which the local cross-connect is
      configured
    suggested-values:
    - uni-1-1-1
  vsi-auto-instantiate:
    description: Specifies if VSI interface enabled by default when creating a ONU
      instance from a ONU template
    optional: true
    suggested-values:
    - 'true'
  tagged-traffic:
    description: A boolean flag to enable user-side tagged traffic.
    optional: true
    suggested-values:
    - true
  tagged-q-vlan-id:
    description: The VLAN ID used to match the ingress user-side traffic, can be a
      value between 1..4094 or any
    optional: true
    suggested-values:
    - '300'
  ethernet-frame-type:
    description: The value to be compared with the second Ethertype to identify the
      VLAN tag number.
    optional: true
    suggested-values:
    - '0x8100'
  tagged-us-pbit:
    description: Specifies how the inner VLAN pbit is marked in the upstream traffic
      towards the network. Options are copy from the user-side, copy from a marking
      pbit derived from the user-side pbit or DSCP, or a fixed value (0..7)
    optional: true
    suggested-values:
    - copy
  tagged-auto-instantiate:
    description: Specifies if tagged traffic rule is enabled by default when creating
      a ONU instance from a ONU template
    optional: true
    suggested-values:
    - 'true'
  prio-tagged-traffic:
    description: A boolean flag to enable user-side priority tagged traffic
    optional: true
    suggested-values:
    - false
  prio-tagged-us-pbit:
    description: Specifies how the inner VLAN pbit is marked in the upstream traffic
      towards the network. Options are copy from the user-side, copy from a marking
      pbit derived from the user-side pbit or DSCP, or a fixed value (0..7)
    optional: true
    suggested-values:
    - copy
  prio-tagged-auto-instantiate:
    description: Specifies if priority tagged traffic rule is enabled by default when
      creating a ONU instance from a ONU template
    optional: true
    suggested-values:
    - 'true'
  untagged-traffic:
    description: A boolean flag enabling user-side untagged traffic
    optional: true
    suggested-values:
    - false
  untagged-auto-instantiate:
    description: Specifies if untagged traffic rule is enabled by default when creating
      a ONU instance from a ONU template
    optional: true
    suggested-values:
    - 'true'
  anyframe-traffic:
    description: A boolean flag enabling user-side anyframe traffic
    optional: true
    suggested-values:
    - false
  anyframe-auto-instantiate:
    description: Specifies if anyframe traffic rule is enabled by default when creating
      a ONU instance from a ONU template
    optional: true
    suggested-values:
    - 'true'
  n-vlan-id:
    description: The normalized VLAN used in between the ONU and the OLT. The N-VLAN-ID
      can be empty, meaning the user-side traffic will be forwarded as is
    optional: true
    suggested-values:
    - 200
  ingress-qos-profile-name:
    description: Specifies the the QoS handling for the user-side traffic. The QoS
      handling can include remarking rules which can be used to mark the upstream
      traffic. The actual marking is enabled through the parameters with suffix US-PBIT
    suggested-values:
    - ingress_qos
  downstream-aes:
    description: Used to designate whether AES should be enabled/disabled for GEM
      ports for the downstream direction.
    optional: true
    suggested-values:
    - 'false'
  upstream-aes:
    description: Used to designate whether AES should be enabled/disabled for GEM
      ports for the upstream direction
    optional: true
    suggested-values:
    - 'false'
  gemport-sharing:
    description: Used to designate whether sharing gemport on uni
    optional: true
    suggested-values:
    - false
  tc0-gemport-id:
    description: GEM Port ID used for the configured Traffic Class 0. The value must
      be left empty when using the macro for configuring a ONU template
    optional: true
    suggested-values:
    - 1020
  tc0-tcont-name:
    description: T-CONT name of gemport for the configured Traffic Class 0
    optional: true
    suggested-values:
    - tcont-1
  tc1-gemport-id:
    description: GEM Port ID used for the configured Traffic Class 1. The value must
      be left empty when using the macro for configuring a ONU template
    optional: true
    suggested-values:
    - 1021
  tc1-tcont-name:
    description: T-CONT name of gemport for the configured Traffic Class 1
    optional: true
    suggested-values:
    - tcont-1
  tc2-gemport-id:
    description: GEM Port ID used for the configured Traffic Class 2. The value must
      be left empty when using the macro for configuring a ONU template
    optional: true
    suggested-values:
    - 1022
  tc2-tcont-name:
    description: T-CONT name of gemport for the configured Traffic Class 2
    optional: true
    suggested-values:
    - tcont-1
  tc3-gemport-id:
    description: GEM Port ID used for the configured Traffic Class 3. The value must
      be left empty when using the macro for configuring a ONU template
    optional: true
    suggested-values:
    - 1023
  tc3-tcont-name:
    description: T-CONT name of gemport for the configured Traffic Class 3
    optional: true
    suggested-values:
    - tcont-1
  tc4-gemport-id:
    description: GEM Port ID used for the configured Traffic Class 4. The value must
      be left empty when using the macro for configuring a ONU template
    optional: true
  tc4-tcont-name:
    description: T-CONT name of gemport for the configured Traffic Class 4
    optional: true
    suggested-values:
    - tcont-1
  tc5-gemport-id:
    description: GEM Port ID used for the configured Traffic Class 5. The value must
      be left empty when using the macro for configuring a ONU template
    optional: true
  tc5-tcont-name:
    description: T-CONT name of gemport for the configured Traffic Class 5
    optional: true
    suggested-values:
    - tcont-1
  tc6-gemport-id:
    description: GEM Port ID used for the configured Traffic Class 6. The value must
      be left empty when using the macro for configuring a ONU template
    optional: true
  tc6-tcont-name:
    description: T-CONT name of gemport for the configured Traffic Class 6
    optional: true
    suggested-values:
    - tcont-1
  tc7-gemport-id:
    description: GEM Port ID used for the configured Traffic Class 7. The value must
      be left empty when using the macro for configuring a ONU template
    optional: true
  tc7-tcont-name:
    description: T-CONT name of gemport for the configured Traffic Class 7
    optional: true
    suggested-values:
    - tcont-1
