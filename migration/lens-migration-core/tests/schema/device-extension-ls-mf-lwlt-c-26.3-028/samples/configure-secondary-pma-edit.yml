arguments:
  netconf-client-name:
    description: Name of NETCONF clients list
    suggested-values:
    - nc-client
  endpoint-name:
    description: The name of specific endpoint
    suggested-values:
    - endpoint
  ip-address:
    description: The IP address or hostname of the endpoint. If no 'address' value
      is specified, then the same 'address' will be used as per the establihsed primary
      callhome connection
    optional: true
    suggested-values:
    - 192.168.2.13
  port:
    description: The IP port for this endpoint. If no 'port' value is specified, then
      the same port will be used as per the established primary callhome connection
    optional: true
    suggested-values:
    - 4336
domains: system>callhome
entity: configure-secondary-pma
freemarker: true
name: Configure secondary pma parameters for callhome
operation: edit
sample-id: system-callhome-configure-secondary-pma-edit
