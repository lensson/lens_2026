arguments:
  lockout-duration:
    description: The time duration of lockout. During this period, access is not allowed.
      Lockout duration can be configured either as dynamic or fixed. Default value
      '0' enables dynamic lockout type. Initial value of dynamic lockout duration
      is 2 minutes and every subsequent failure increase the lockout-duration for
      2 minutes. Maximum lockout duration is restricted to 15 minutes.
    optional: true
    suggested-values:
    - 0
  lockout-type:
    description: Defines the capability of the system to lockout ip address or users
      when failed login attempts is reached.
    optional: true
    suggested-values:
    - ip-addr
  max-retry-attempts:
    description: The cumulative number of failed login attempts happen to trigger
      a lockout. Once a failed login attempt happens, the remaining failed attempts
      should happen within lockout-duration to trigger a lockout. If failed login
      attempt, until max-retry-attempt happen after the lockout-duration, then the
      whole procedure is reset and no lockout happens.
    optional: true
    suggested-values:
    - 3
domains: system>lockout
freemarker: true
name: Configure system lockout
operation: edit
sample-id: system-lockout-edit
status: draft
