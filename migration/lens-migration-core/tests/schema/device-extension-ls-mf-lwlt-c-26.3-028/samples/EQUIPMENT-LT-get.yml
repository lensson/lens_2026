arguments:
  board-name:
    description: Name of the hardware from which operational data should be retrieved.
      If this RPC is executed on NT,then the board-name is LT name (fglt-b-1). If
      this RPC is executed on LT,then the board-name is Board.
    suggested-values:
    - Board
    - fglt-b-1
domains: equipment>lt
freemarker: true
name: Get operational data of the LT
operation: get
sample-id: equipment-lt-get
scope: not(inband-l2term) and not(eth-copper) and not(eth-copper-ci) and not(df32gm)
status: draft
