arguments:
  syslog-collector-name:
    description: Remote destination log collector name
    suggested-values:
    - logCollector2
  ipaddress:
    description: 'Uniquely specifies the address of the remote collector. One of the
      following MUST be specified: an ipv4/ipv6 address or a hostname'
    suggested-values:
    - 10.0.0.1
  port:
    description: The port-number of remote collector to deliver syslog messages. The
      default port is 6514. Port 0 is not allowed to be configured.
    suggested-values:
    - 6514
  pinned-ca-list:
    description: The pinned certificates list name to be used for syslog
    optional: true
    suggested-values:
    - syslog_ca_list
  server-auth-est-profile-name:
    description: The PKI EST profile name to be used for server authentication, if
      parameter 'pinned-ca-list' is empty
    optional: true
    suggested-values:
    - EstProfile
  advance-action:
    description: If action is LOG (default) then message will be logged. If action
      is BLOCK then the message will not be logged.
    optional: true
    suggested-values:
    - log
  advance-compare:
    description: If compare is EQUALS-OR-HIGHER (default) then the severity comparison
      operation will be equals or higher. Else if compare is EQUALS then the severity
      comparison operation will be equals.
    optional: true
    suggested-values:
    - equals-or-higher
  facility:
    description: represents the process that creates the syslog event. For example,
      USER facility refers to all applications that can be listed with "get all active
      applications" and their log level can be configured explicitly. Available facilities
      are USER, SYSLOG, NTP, FTP and default facility is USER.
    optional: true
    suggested-values:
    - user
  severity:
    description: by default the severity with equal or higher importance from the
      given value are allowed. Severity configured for remote collector take precedence
      over the one configured in application level
    optional: true
    suggested-values:
    - info
  pattern-match:
    description: string that can be used to select a syslog message for logging
    optional: true
    suggested-values:
    - logMgr
  idle-time:
    description: The time (in seconds) that a connection must be idle before the first
      keepalive packet is sent
    optional: true
    suggested-values:
    - 7200
  max-probes:
    description: The maximum number of unacknowledged keepalive packets that the system
      will send before considering the connection dead
    optional: true
    suggested-values:
    - 9
  probe-interval:
    description: The interval (in seconds) between successive keepalive packets if
      no response (acknowledgment) is received from the remote host
    optional: true
    suggested-values:
    - 75
  tls-version:
    description: YANG identifier of a TLS protocol version to add
    optional: true
    suggested-values:
    - tls13
  cipher-suite:
    description: YANG identifier of a TLS cipher to add
    optional: true
    suggested-values:
    - tls-aes-256-gcm-sha384
domains: system>logging>remote-syslog-collector
entity: tls
freemarker: true
name: Configure remote syslog collector over TLS
operation: edit
sample-id: system-logging-remote-syslog-collector-tls-edit
status: draft
