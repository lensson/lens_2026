arguments:
  log-file-name:
    description: file name length must be up to 31 characters and must contain only
      alphanumeric characters, underscores "_", hyphens "-" and dot "." (only one
      dot allowed).
    suggested-values:
    - syslog.log
  advance-action:
    description: if action is LOG (default) then message will be logged. If action
      is BLOCK then the message will not be logged.
    optional: true
    suggested-values:
    - log
  advance-compare:
    description: if compare is EQUALS-OR-HIGHER (default) then the severity comparison
      operation will be equals or higher. Else if compare is EQUALS then the severity
      comparison operation will be equals.
    optional: true
    suggested-values:
    - equals-or-higher
  facility:
    description: represents the process that creates the syslog event. For example,
      USER facility refers to all applications that can be listed with "get all active
      applications" and their log level can be configured explicitly. Available facilities
      are USER, SYSLOG, NTP, FTP and default facility is USER.
    optional: true
    suggested-values:
    - user
  max-file-size:
    description: size in the range of 1 up to 10 megabytes. The size of active file
      is checked periodically. When the system identify that the actual file size
      is greater than maximum allowed value a log rotation take place.
    optional: true
    suggested-values:
    - 1
  number-of-files:
    description: 'number of rotated files retained on the device. Allowed range is
      0..10, with default: 1. Value 0 indicate that overwrite of the file will take
      place.'
    optional: true
    suggested-values:
    - 10
  rollover-count:
    description: syslog messages that arrive after the rollover period cause the current
      log file to be closed and a new file to be opened. Values must be in minutes
      and could be either 60 (hourly), 1440 (daily), 10080 (weekly).
    optional: true
    suggested-values:
    - 60
  retention-count:
    description: specifies the length of time that completed/closed log event files
      should be stored in the file system before they are removed. Values must be
      in hours and could be either 24 (daily), 168 (7*24 weekly), 720 (30*24 monthly).
    optional: true
    suggested-values:
    - 24
  severity:
    description: by default the severity with equal or higher importance from the
      given value are allowed. Severity configured for file take precedence over the
      one configured in application level
    optional: true
    suggested-values:
    - info
  pattern-match:
    description: string that can be used to select a syslog message for logging
    optional: true
    suggested-values:
    - logMgr
domains: system>logging>local-syslog-collector
freemarker: true
name: Configure local syslog collector
operation: edit
sample-id: system-logging-local-syslog-collector-edit
scope: not(mx) and not(syslog-reduce-size)
status: draft
