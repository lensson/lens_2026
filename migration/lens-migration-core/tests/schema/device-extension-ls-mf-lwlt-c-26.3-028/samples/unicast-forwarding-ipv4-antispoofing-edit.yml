arguments:
  cc-name:
    description: The name of CC sample. In IBRIDGE senario, leave it empty
    optional: true
  ibridge-user-port-name:
    description: The name of IBRIDGE-USER-PORT sample. In CC senario, leave it empty
    optional: true
  enable-ipv4-security:
    description: If set to true, the system will perform source IPv4 address security
      checks on incoming packets on the VLAN sub-interface.
    suggested-values:
    - true
    - false
  learn-addresses-from-dhcp:
    description: If set to true, the system will learn source IPv4 addresses from
      the DHCPv4 messages passing the VLAN sub-interface, and stores them in Antispoofing
      table of that VLAN sub-interface.
    optional: true
    suggested-values:
    - true
    - false
  max-address:
    description: Specifies the maximum number of IPv4 address (static and dynamic)
      allowed for VLAN sub-interfaces.
    optional: true
    suggested-values:
    - no-limit
    - '16'
  ipv4-security-statistics:
    description: If set to true, IPv4 security check statistics on the VLAN sub-interface
      are collected.
    optional: true
    suggested-values:
    - true
    - false
domains: unicast>forwarding>ipv4-antispoofing
freemarker: true
name: Configure IPv4 antispoofing parameters
operation: edit
sample-id: unicast-forwarding-ipv4-antispoofing-edit
scope: fiber
status: draft
