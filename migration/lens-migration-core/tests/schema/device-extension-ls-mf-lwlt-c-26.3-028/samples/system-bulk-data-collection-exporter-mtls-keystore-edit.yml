arguments:
  exporter-name:
    description: exporter name
    suggested-values:
    - Exporter1
  collector-name:
    description: collector name
    suggested-values:
    - Collector1
  dest-ip-address:
    description: destination ip address
    optional: true
    suggested-values:
    - 192.0.2.16
  dest-fqdn:
    description: destination FQDN
    optional: true
    suggested-values:
    - sdan.nokia.com
  dest-port:
    description: destination port
    suggested-values:
    - 4740
  username:
    description: username
    suggested-values:
    - admin
  password:
    description: password
    sensitive: true
    suggested-values:
    - $0$admin
  priority:
    description: priority
    suggested-values:
    - 2
  retransmission-timeout:
    description: retransmission timeout
    suggested-values:
    - 10
  ipfix-exporting-enable:
    description: export enable flag
    suggested-values:
    - true
  server-auth-est-profile-name:
    description: The PKI EST profile name to be used to authenticate the IPFIX collector
    optional: true
    suggested-values:
    - EstProfile
  ca-name:
    description: The local pinned certificate name to be used for connection to IPFIX
      collector
    optional: true
    suggested-values:
    - CA
  tls-version:
    description: A TLS version to add to the list of acceptable TLS versions of hello
      parameters
    optional: true
    suggested-values:
    - tls13
  cipher-suite:
    description: A cipher suite to add to the list of acceptable cipher suites of
      hello parameters
    optional: true
    suggested-values:
    - tls-aes-256-gcm-sha384
domains: system>bulk-data-collection>exporter
entity: mtls-keystore
freemarker: true
name: Configure IPFIX mTLS collector by using reference to asymmetric key pair of
  keystore
operation: edit
sample-id: system-bulk-data-collection-exporter-mtls-keystore-edit
status: draft
