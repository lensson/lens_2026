arguments:
  max-length:
    description: The maximum length of the password.Default value 20.
    optional: true
    suggested-values:
    - 20
  min-length:
    description: The minimum length of the password. Default value 8.
    optional: true
    suggested-values:
    - 8
  min-num-numeric-char:
    description: The minimum number of numerical characters.Default value 1.
    optional: true
    suggested-values:
    - 1
  min-num-special-char:
    description: The minimum number of special characters.Default value 1.
    optional: true
    suggested-values:
    - 1
  mixed-case:
    description: Both upper and lower-case alphabet characters are mandatory.Default
      value true.
    optional: true
    suggested-values:
    - true
domains: system>password-policy
freemarker: true
name: Configure system password policy
operation: edit
sample-id: system-password-policy-edit
status: draft
