arguments:
  onu-name:
    description: ONU name
    suggested-values:
    - ani-1-1-1
  pots-name:
    description: POTS interworking node for which performance to be enabled or disabled
    suggested-values:
    - POTS1
  pm-flag:
    description: '**true** to enable or **false** to disable PM counters for POTS
      interworking node'
    suggested-values:
    - 'true'
domains: onu>transport>voip-sip
freemarker: true
name: Set PM state for POTS interworking node
operation: enable-disable-pm-counter
sample-id: onu-transport-voip-sip-enable-disable-pm-counter
scope: eonu
status: draft
