arguments:
  onu-name:
    description: ONU name
    suggested-values:
    - ani-1-1-1
  ethernet-physical-layer-error-profile:
    description: Ethernet physical layer performance monitoring counters threshold
      profile name
    suggested-values:
    - eth_phy_layer_tca_profile
  excessive-collision-threshold:
    description: Threshold value for the total number of frames whose transmission
      failed due to excessive collisions range is 0 .. 4294967294
    optional: true
    suggested-values:
    - 10
  late-collision-threshold:
    description: Threshold value for the number of late collisions detected range
      is 0 .. 4294967294
    optional: true
    suggested-values:
    - 5
  rx-buffer-overflow-threshold:
    description: Threshold value for receive buffer overflows  range is 0 .. 4294967294
    optional: true
    suggested-values:
    - 10
  tx-buffer-overflow-threshold:
    description: Threshold value for the transmit buffer overflows   range is 0 ..
      4294967294
    optional: true
    suggested-values:
    - 10
  single-collision-threshold:
    description: Threshold value for number of frames delayed by single collision  range
      is 0 .. 4294967294
    optional: true
    suggested-values:
    - 10
  multiple-collision-threshold:
    description: Threshold value for number of frames delayed by multiple collisions  range
      is 0 .. 4294967294
    optional: true
    suggested-values:
    - 10
  sqe-counter-threshold:
    description: Threshold value for the number of times that the SQE test error message
      were generated  range is 0 .. 4294967294
    optional: true
    suggested-values:
    - 10
  deferred-tx-threshold:
    description: Threshold value for the number of frames whose first transmission
      attempt was delayed because the medium was busy  range is 0 .. 4294967294
    optional: true
    suggested-values:
    - 10
  internal-mac-tx-error-threshold:
    description: Threshold value for the number of frames whose transmission failed
      due to an internal MAC sublayer transmit error  range is 0 .. 4294967294
    optional: true
    suggested-values:
    - 10
  carrier-sense-error-threshold:
    description: Threshold value for the number of times that carrier sense was lost
      while transmitting a frame  range is 0 .. 4294967294
    optional: true
    suggested-values:
    - 10
  alignment-error-threshold:
    description: Theshold value for the number of frames received with alignment error  range
      is 0 .. 4294967294
    optional: true
    suggested-values:
    - 10
  internal-mac-rx-error-threshold:
    description: Threshold value for the number of frames whose reception failed due
      to an internal MAC sublayer  receive error  range is 0 .. 4294967294
    optional: true
    suggested-values:
    - 10
domains: onu>system>tca>pm-profiles
entity: eth-phy-tca-profile
freemarker: true
name: Config Ethernet physical layer error TCA profile
operation: create
sample-id: onu-system-tca-pm-profiles-eth-phy-tca-profile-create
scope: eonu
status: draft
