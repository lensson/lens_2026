    suggested-values:
    - 202
  pri-guest-voice-signaling-app-all-apps-profile:
    description: Priority bits in the media policy configured for guest-voice-signaling
      application type in policy profile.
    suggested-values:
    - 5
  vlan-id-softphone-voice-app-all-apps-profile:
    description: VLAN ID in the media policy configured for softphone-voice application
      type in policy profile.
    suggested-values:
    - 203
  pri-softphone-voice-app-all-apps-profile:
    description: Priority bits in the media policy configured for softphone-voice
      application type in policy profile.
    suggested-values:
    - 4
  dscp-streaming-video-app-all-apps-profile:
    description: DSCP in the media policy configured for streaming-video application
      type in policy profile.
    suggested-values:
    - 56
  vlan-id-video-conferencing-app-all-apps-profile:
    description: VLAN ID in the media policy configured for video-conferencing application
      type in policy profile.
    suggested-values:
    - 204
  pri-video-conferencing-app-all-apps-profile:
    description: Priority bits in the media policy configured for video-conferencing
