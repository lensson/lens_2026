    description: ONU name
    suggested-values:
    - ani-1-1-1
  active-software-release:
    description: ACTIVE-SOFTWARE-RELEASE-NAME
    optional: true
  passive-software-release:
    description: PASSIVE-SOFTWARE-RELEASE-NAME
    optional: true
  target-delayed-activation:
    description: TARGET-SOFTWARE-CONTROL
    optional: true
    suggested-values:
