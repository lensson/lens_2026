arguments:
  onu-name:
    description: ONU name
    suggested-values:
    - ani-1-1-1
  ani-name:
    description: The name of an Access Node Interface.
    suggested-values:
    - ani-1-1-1
  vpn-name:
    description: The name of a multicast uncontrolled vpn.
    suggested-values:
    - mc-uncontrolled-vpn
  mc-gemport-id:
    description: Multicast Gemport ID value, must be 2047 for GPON or 65534 for XGS
