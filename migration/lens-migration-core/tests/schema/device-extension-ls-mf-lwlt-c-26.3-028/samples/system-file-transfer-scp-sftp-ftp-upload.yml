arguments:
  host-url:
    description: sftp, scp or ftp server url. Note that a URL that does not end with
      a forward slash / will modify the name of the final compressed file that is
      to be uploaded.
    suggested-values:
    - protocol://host
  category-type:
    description: Define files category
    suggested-values:
    - syslog
  username:
    description: The username that will be used
    suggested-values:
    - atxuser
  password:
    description: password
    sensitive: true
    suggested-values:
    - password01
  compression:
    description: Compression format, allowed values is gzip or lzop (default is gzip)
    optional: true
    suggested-values:
    - gzip
    - lzop
  filename:
    description: The name of the file that will be uploaded, in case that is omitted
      all the files of the specifed category will be uploaded
    optional: true
    suggested-values:
    - syslog.log
domains: system>file-transfer
entity: scp-sftp-ftp
freemarker: true
name: Upload files using SFTP, SCP or FTP protocol with password authentication
operation: upload
sample-id: system-file-transfer-scp-sftp-ftp-upload
status: draft
