arguments:
  ibridge-user-port-name:
    description: The name of the local VLAN port on the OLT. The macro will create
      the LT-side configuration as well as enabling (instantiating) the cross-connect
      when the ONU is configured by template
    suggested-values:
    - user-port-1
  enet-name:
    description: The name of the virtual UNI on which the local cross-connect is configured
    suggested-values:
    - ETH1
  onu-name:
    description: The name of ONU instance for enabling the ONU-side cross-connect
      and the related user-side traffic types
    optional: true
    suggested-values:
    - ani-1-1-1
  ibridge-name:
    description: The name of network-side VLAN sub-interface, which is connected to
      either the backplane or the uplink interfaces and ports
    suggested-values:
    - bridge-1
  vector-of-data-name:
    description: The name of vector of data profile
    suggested-values:
    - user-port-vector-of-data
  onu-template-cc-name:
    description: The name of the VLAN sub-interface created by the cross-connect macro
      in the ONU template
    optional: true
    suggested-values:
    - cc-template-1
  onu-template-instantiate-tagged:
    description: Enables the tagged traffic on this VLAN sub-interface as defined
      in the ONU template
    optional: true
    suggested-values:
    - false
  onu-template-instantiate-untagged:
    description: Enables the untagged traffic on this VLAN sub-interface as defined
      in the ONU template
    optional: true
    suggested-values:
    - false
  onu-template-instantiate-prio-tagged:
    description: Enables the priority tagged traffic on this VLAN sub-interface as
      defined in the ONU template
    optional: true
    suggested-values:
    - false
  onu-template-instantiate-anyframe:
    description: Enables the anyframe traffic on this VLAN sub-interface as defined
      in the ONU template
    optional: true
    suggested-values:
    - false
  olt-infrastructure-name:
    description: The OLT infrastructure name used as root for traffic scheduling
    optional: true
    suggested-values:
    - gpon-1-1
  leaf-scheduler-name:
    description: The leaf scheduler name to which the traffic is sent in downstream
    optional: true
    suggested-values:
    - sch-node-uni1
  frame-processing-profiles-name:
    description: the name of the N-VLAN profile
    suggested-values:
    - IBRIDGE-USER-PROFILE
  gemport-sharing:
    description: Used to indicate whether gemport sharing is enabled. Setting this
      variable to false means that gemports are associated with VLAN sub-interface;
      setting this variable to true means that gemports are not associated with VLAN
      sub-interface and they are shared between the VLAN sub-interfaces on top of
      the lower layer interface. Not setting this variable defaults the value to be
      false(gemport sharing is disabled).
    optional: true
    suggested-values:
    - false
    - true
  tc0-gemport-id:
    description: The GEM Port ID used for the configured Traffic Class
    optional: true
    suggested-values:
    - 1024
  tc0-gemport-set-name:
    description: GEMPORT set name to indicate no-sharing, uni-sharing or onu-sharing
      for traffic class 0
    optional: true
    suggested-values:
    - no-sharing
  tc1-gemport-id:
    description: The GEM Port ID used for the configured Traffic Class
    optional: true
    suggested-values:
    - 1025
  tc1-gemport-set-name:
    description: GEMPORT set name to indicate no-sharing, uni-sharing or onu-sharing
      for traffic class 1
    optional: true
    suggested-values:
    - no-sharing
  tc2-gemport-id:
    description: The GEM Port ID used for the configured Traffic Class
    optional: true
    suggested-values:
    - 1026
  tc2-gemport-set-name:
    description: GEMPORT set name to indicate no-sharing, uni-sharing or onu-sharing
      for traffic class 2
    optional: true
    suggested-values:
    - no-sharing
  tc3-gemport-id:
    description: The GEM Port ID used for the configured Traffic Class
    optional: true
    suggested-values:
    - 1027
  tc3-gemport-set-name:
    description: GEMPORT set name to indicate no-sharing, uni-sharing or onu-sharing
      for traffic class 3
    optional: true
    suggested-values:
    - no-sharing
  tc4-gemport-id:
    description: The GEM Port ID used for the configured Traffic Class
    optional: true
    suggested-values:
    - 1028
  tc4-gemport-set-name:
    description: GEMPORT set name to indicate no-sharing, uni-sharing or onu-sharing
      for traffic class 4
    optional: true
    suggested-values:
    - no-sharing
  tc5-gemport-id:
    description: The GEM Port ID used for the configured Traffic Class
    optional: true
    suggested-values:
    - 1029
  tc5-gemport-set-name:
    description: GEMPORT set name to indicate no-sharing, uni-sharing or onu-sharing
      for traffic class 5
    optional: true
    suggested-values:
    - no-sharing
  tc6-gemport-id:
    description: The GEM Port ID used for the configured Traffic Class
    optional: true
    suggested-values:
    - 1030
  tc6-gemport-set-name:
    description: GEMPORT set name to indicate no-sharing, uni-sharing or onu-sharing
      for traffic class 6
    optional: true
    suggested-values:
    - no-sharing
  tc7-gemport-id:
    description: The GEM Port ID used for the configured Traffic Class
    optional: true
    suggested-values:
    - 1031
  tc7-gemport-set-name:
    description: GEMPORT set name to indicate no-sharing, uni-sharing or onu-sharing
      for traffic class 7
    optional: true
    suggested-values:
    - no-sharing
  downstream-aes:
    description: Used to designate whether AES should be enabled/disabled for GEM
      ports for the downstream direction
    optional: true
    suggested-values:
    - false
  upstream-aes:
    description: Used to designate whether AES should be enabled/disabled for GEM
      ports for the upstream direction
    optional: true
    suggested-values:
    - false
  egress-qos-policy-profile-name:
    description: the qos policy profile name referenced by the VLAN sub-interface
      for egress
    suggested-values:
    - DOWNSTREAM_USERPORT
  ingress-qos-policy-profile-name:
    description: the qos policy profile for the ingress traffic at the LT-side
    optional: true
    suggested-values:
    - UPSTREAM_USERPORT
  onu-ingress-qos-policy-profile-name:
    description: the qos policy profile name that overrides the ingress QoS policy
      profile configured in the ONU template. This parameter must be left empty in
      case the ONU is directly configured (without ONU template)
    optional: true
    suggested-values:
    - ingress_qos
  max-number-mac-address:
    description: the maximum number of MAC addresses that can be stored in the forwarding
      database for this interface
    optional: true
    suggested-values:
    - 4294967295
  ip-anti-spoofing:
    description: Control flag to enable IPv4 address security checks on incoming packets
      on the VLAN sub-interface
    optional: true
    suggested-values:
    - false
  ip-anti-spoofing-statistics:
    description: Control flag to enable IPv4 security check statistics of the user
      interface are collected. This setting requires that ip-anti-spoofing must be
      set to true
    optional: true
    suggested-values:
    - false
  performance-enable:
    description: Control flag to enable counting of performance statistics
    optional: true
    suggested-values:
    - false
domains: unicast>forwarding
entity: ibridge_user_port
freemarker: true
name: Create user-port VSI and attach it to unicast services forwarding ibridge
operation: edit
sample-id: unicast-forwarding-ibridge_user_port-edit
scope: not(fx-p2p)
status: draft
