arguments:
  onu-name:
    description: ONU name
    suggested-values:
    - ani-1-1-1
  eth-port-hw-number:
    suggested-values:
    - 1
  eth-port-hw-option:
    description: ONU Ethernet HW Option,Values Range:[rj45, rj45-10-100M, rj45-1G,
      rj45-10, rj45-2.5G, rj45-5G, rj45-25G, rj45-40G, veip, rf-video],port type specification
      is required if ONU support multiple electrical UNI port type. Otherwise,if ONU
      only has one rj45 port type, port type specification is not required,this value
      just setting rj45. This parameter should be blank for pluggable-optical-electrical-SFP
      and special-integrated-ONUs.
    suggested-values:
    - rj45
  special-integrated-ONUs:
    allowed-values:
    - true
    - false
    description: This attribute is indicate that this kind ONU will report several
      different virtual boards for ethernet ports with same port type,Configure these
      special ONUs with virtual-borad-number and port-id, special onu list:[U-00160CP-P,G-00240G-M]
    optional: true
    suggested-values:
    - false
  pluggable-optical-electrical-SFP:
    allowed-values:
    - true
    - false
    description: This attribute is indicate that for UNI, if an pluggable optical/electrical
      SFP is used or not
    optional: true
    suggested-values:
    - false
  enet-name:
    description: ONU ENET Port name
    suggested-values:
    - uni-1-1-1
domains: onu>transport>xpon>enet
freemarker: true
name: Delete ethernet uni interface
operation: remove
sample-id: onu-transport-xpon-enet-remove
scope: eonu
status: draft
