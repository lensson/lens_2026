arguments:
  cc-name:
    description: The name of CC sample. In IBRIDGE senario, leave it empty
    optional: true
  ibridge-user-port-name:
    description: The name of IBRIDGE-USER-PORT sample. In CC senario, leave it empty
    optional: true
  enable-ipv6-security:
    description: If set to true, the system will perform source IPv6 address security
      checks on incoming packets on the VLAN sub-interface.
    suggested-values:
    - true
    - false
  learn-addresses-from-dhcpv6:
    description: If set to true, the system will learn source IPv6 addresses from
      the DHCPv6 messages passing the VLAN sub-interface, and stores them in Antispoofing
      table of that VLAN sub-interface.
    optional: true
    suggested-values:
    - true
    - false
  max-address:
    description: Specifies the maximum number of IPv6 address (static and dynamic)
      allowed for VLAN sub-interfaces.
    optional: true
    suggested-values:
    - no-limit
    - '16'
  ipv6-security-statistics:
    description: If set to true, IPv6 security check statistics on the VLAN sub-interface
      are collected.
    optional: true
    suggested-values:
    - false
    - true
domains: unicast>forwarding>ipv6-antispoofing
freemarker: true
name: Configure IPv6 antispoofing parameters
operation: edit
sample-id: unicast-forwarding-ipv6-antispoofing-edit
scope: fiber
status: draft
