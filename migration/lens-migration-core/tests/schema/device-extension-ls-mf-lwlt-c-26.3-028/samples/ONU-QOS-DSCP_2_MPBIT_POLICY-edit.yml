arguments:
  onu-name:
    description: ONU name
    suggested-values:
    - ani-1-1-1
  dscp0-mpbit:
    description: Value for marked pbit to traffic class 0, value could be number list
      (0-10) or (0,3,10), any, untag to indicate write pbit for untagged package
    optional: true
    suggested-values:
    - '0'
  dscp1-mpbit:
    description: Value for marked pbit to traffic class 1, value could be number list
      (0-10) or (0,3,10), any, untag to indicate write pbit for untagged package
    optional: true
    suggested-values:
    - '1'
  dscp2-mpbit:
    description: Value for marked pbit to traffic class 2, value could be number list
      (0-10) or (0,3,10), any, untag to indicate write pbit for untagged package
    optional: true
    suggested-values:
    - '2'
  dscp3-mpbit:
    description: Value for marked pbit to traffic class 3, value could be number list
      (0-10) or (0,3,10), any, untag to indicate write pbit for untagged package
    optional: true
    suggested-values:
    - '3'
  dscp4-mpbit:
    description: Value for marked pbit to traffic class 4 (if specified)
    optional: true
  dscp5-mpbit:
    description: Value for marked pbit to traffic class 5 (if specified)
    optional: true
  dscp6-mpbit:
    description: Value for marked pbit to traffic class 6 (if specified)
    optional: true
  dscp7-mpbit:
    description: Value for marked pbit to traffic class 7 (if specified)
    optional: true
  dscp-2-mpbit-policy:
