arguments:
  pinned-ca-list:
    description: The local pinned certificates list name to be used for connection
      to License Server
    optional: true
    suggested-values:
    - cswl
  server-auth-est-profile-name:
    description: The PKI EST profile name to be used for connection to License Server
    optional: true
    suggested-values:
    - EstProfile
  tls-version:
    description: A TLS version to add to the list of acceptable TLS versions of hello
      parameters
    optional: true
    suggested-values:
    - tls13
  cipher-suite:
    description: A cipher suite to add to the list of acceptable cipher suites of
      hello parameters
    optional: true
    suggested-values:
    - tls-chacha20-poly1305-sha256
domains: system>licensing
entity: client-keystore
freemarker: true
name: Configure keystore for connection to License Server
operation: edit
sample-id: system-licensing-client-keystore-edit
scope: licensing
status: draft
