arguments:
  on-admindown:
    description: If set to true, IPv6 addresses learnt via DHCPv6 on an interface
      will be cleared, whenever the interface state goes to admin-down.
    optional: true
    suggested-values:
    - true
    - false
  prefix-mode:
    description: Identifies the mode in which IPv6 addresses should be configured
      in the system.
    optional: true
    suggested-values:
    - allow-prefix-length-64
    - allow-prefix-length-128
  tca-in-ipv6-packet-discards:
    description: Specifies a threshold value of in-ipv6-packet-discards. When packets
      with illegal source IP and/or source MAC address exceed the threshold value
      within certain interval, a TCA alarm will be raised.
    optional: true
    suggested-values:
    - 1000
domains: system>ip-antispoofing
entity: v6
freemarker: true
name: Configure system level IPv6 antispoofing parameters
operation: edit
sample-id: system-ip-antispoofing-v6-edit
status: draft
