arguments:
  host-url:
    description: sftp or scp server url. Note that a URL that does not end with a
      forward slash / will modify the name of the final compressed file that is to
      be uploaded.
    suggested-values:
    - protocol://host
  category-type:
    description: Define files category
    suggested-values:
    - syslog
  username:
    description: The username that will be used
    suggested-values:
    - atxuser
  ssh-key-type:
    description: Algorithm of ssh-key, allowed values is ssh-rsa, ssh-dss and ecdsa-sha2-nistp256
    suggested-values:
    - ssh-rsa
    - ssh-dss
    - ecdsa-sha2-nistp256
  compression:
    description: Compression format, allowed values is gzip or lzop
    optional: true
    suggested-values:
    - gzip
    - lzop
  filename:
    description: The name of the file that will be uploaded, in case that is omitted
      all the files of the specifed category will be uploaded
    optional: true
    suggested-values:
    - syslog.log
domains: system>file-transfer
entity: scp-sftp
freemarker: true
name: Upload files using SFTP or SCP protocol with ssh-key authentication
operation: upload
sample-id: system-file-transfer-scp-sftp-upload
status: draft
