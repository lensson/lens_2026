arguments:
  component:
    description: Name of the component, default must be Chassis.
    suggested-values:
    - Chassis
  download-software-name:
    description: Operator chosen name to the software revision to be downloaded
    suggested-values:
    - L6GQAH62.599
    - LSR2212_Active_SW
  mode-HTTPS:
    description: Mode selection for download using https
    suggested-values:
    - mTLS
    - TLS
    - false
  mTLS-with-EST:
    description: Indicates if PKI EST profile names should be used with mTLS during
      HTTPS-based download.
    optional: true
    suggested-values:
    - false
    - true
  server-public-key:
    description: CA certificate of the server
    optional: true
    suggested-values:
    - CA
  software-name:
    description: Name of the (predefined) target software type
    suggested-values:
    - application_software
    - FGLT-B_software
    - ont_software
    - transformation_software
    - onu_vendor_specific_software
  url:
    description: URL from which download should be triggered.This URL can use either
      an IP address or a Fully Qualified Domain Name (FQDN).
    suggested-values:
    - https://135.249.1.1/L6GQAH/L6GQAH20.000
    - ftp://username:password@hostname.domain.com/descriptor_file_path
  verify-enable:
    description: Enable or Disable verification of software after download.
    optional: true
    suggested-values:
    - true
    - false
  client-key-reference:
    description: The client-key-reference that is going to be used for mTLS download
    optional: true
    suggested-values:
    - factory-callhome-key
  client-public-key-reference:
    description: The client-public-key-reference to be used for mTLS download
    optional: true
    suggested-values:
    - factory-callhome-cert
  client-auth-est-profile-name:
    description: The PKI EST profile name to be used for mTLS download. This profile
      will be used for client authentication.
    optional: true
    suggested-values:
    - EstProfile
  server-auth-est-profile-name:
    description: The PKI EST profile name to be used for mTLS download. This profile
      will be used for server authentication.
    optional: true
    suggested-values:
    - EstProfile
  key-name:
    allowed-values:
    - ecdsa-sha2-nistp256
    - ssh-dss
    - ssh-rsa
    description: SSH key name to be used for key-based sftp download.
    optional: true
    suggested-values:
    - ecdsa-sha2-nistp256
available-locally: true
domains: system>software
freemarker: true
name: Download new software
operation: download
sample-id: system-software-download
status: draft
