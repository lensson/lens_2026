arguments:
  onu-name:
    description: ONU name
    suggested-values:
    - ani-1-1-1
  ani-name:
    description: The name on an Access Node Interface.
    suggested-values:
    - ani-1-1-1
  mc-gemport-name:
    description: The name of multicast-gemport.
    suggested-values:
    - mc-gemport
  mc-gemport-id:
    description: Multicast Gemport ID value, must be 2047 for GPON or 65534 for XGS
      PON and NGPON2. Incidental Gemport ID value, must be 2046 for GPON or 65533
      for XGS PON and 25GS-PON. Incidental Gemport is for SSM only.
    suggested-values:
    - 2047
  is-broadcast:
    description: A boolean value that is used to indicate if this multicast GEM port
      is an incidental GEM port. If true, this multicast GEM port is an incidental
      GEM port.
    optional: true
    suggested-values:
    - false
domains: onu>multicast>vpn
entity: interface
freemarker: true
name: Configure multicast interface
operation: create
sample-id: onu-multicast-vpn-interface-create
scope: eonu
status: draft
