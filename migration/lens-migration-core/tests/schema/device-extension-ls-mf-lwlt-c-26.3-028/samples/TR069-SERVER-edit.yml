arguments:
  onu-name:
    description: ONU name
    suggested-values:
    - ani-1-1-1
  onu-template-name:
    description: ONU template name
    suggested-values:
    - onu_template
  authentication-user-name:
    description: Authentication user name
    optional: true
    suggested-values:
    - admin
  authentication-user-password:
    description: authentication user password.
    optional: true
    sensitive: true
    suggested-values:
    - admin
  admin-state:
    description: In almost all the deployment scenarios, the TR-069 connection is
      configured with unlocked.
    optional: true
    suggested-values:
    - unlocked
  onu-template-VEIP:
    description: Identifies within the ONU template the VEIP interface that is to
      be instantiated within the actual ONU instance.The actual attributes will have
      the data as configured in the template but completed / overruled with the data
      provided in this list entry.
    suggested-values:
    - onu-VEIP
domains: transport>tr069
